<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ubuntu+Mono&display=swap');

        * {
            font-family: "Ubuntu Mono", monospace;
            background-color: #000;
            color: #fff;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 🔹 Кнопка назад */
        .main-btn {
            position: absolute;
            top: 20px;
            left: 20px;

            padding: 8px 14px;
            border: 1px solid #fff;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }

        .main-btn:hover {
            background: #fff;
            color: #000;
        }

        /* 🔹 Контейнер */
        .container {
            width: 320px;
            text-align: center;
        }

        h1 {
            margin-bottom: 25px;
        }

        /* 🔹 Поля */
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            font-size: 14px;
            opacity: 0.7;
        }

        input {
            border: none;
            border-bottom: 1px solid #fff;
            padding: 6px 0;
            margin-top: 5px;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-bottom: 1px solid #6c63ff;
        }

        /* 🔹 Кнопка */
        button {
            width: 100%;
            padding: 10px;
            border: 1px solid #fff;
            background: transparent;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #fff;
            color: #000;
        }

        /* 🔹 Результат / сообщение */
        .result {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

<a href="/" class="main-btn">Main</a>

<div class="container">
    <h1>Login</h1>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Username</label>
            <input name="username" type="text" placeholder="Введите логин">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input name="password" type="password" placeholder="Введите пароль">
        </div>

        <button type="submit">Войти</button>
    </form>

    {% if pipi %}
    <div class="result">
        {{ pipi }}
    </div>
    {% endif %}
</div>

</body>
</html>
