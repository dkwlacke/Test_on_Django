<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 320px;
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
        }

        h2 {
            margin-bottom: 20px;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .main-btn {
            position: absolute;
            top: 20px;
            right: 1000px;

            padding: 10px 15px;
            background: white;
            color: #5f9cff;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #5563d1;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #f5f7ff;
        }

        .result span {
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Калькулятор</h1>
    <a href="/" class="main-btn">Main</a>
    <form method="post">
        {% csrf_token %}

        <input type="number" name="num1" placeholder="Первое число" required>
        <input type="number" name="num2" placeholder="Второе число" required>

        <select name="operation">
            <option value="add">Сложение (+)</option>
            <option value="sub">Вычитание (-)</option>
            <option value="multi">Умножение(*)</option>
            <option value="div">Умножение(/)</option>
        </select>

        <button type="submit">Посчитать</button>
    </form>

    <div class="result">
        <h3>Результат: {{ res }}</h3>
        <p>
            <span>Первое число:</span> {{ num1 }} <br>
            <span>Второе число:</span> {{ num2 }}
        </p>
    </div>
</div>

</body>
</html>
