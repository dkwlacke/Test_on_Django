<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ubuntu+Mono&display=swap');

        * {
            font-family: "Ubuntu Mono", monospace;
            background-color: #000;
            color: #fff;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 🔹 Кнопка назад */
        .main-btn {
            position: absolute;
            top: 20px;
            left: 20px;

            padding: 8px 14px;
            border: 1px solid #fff;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }

        .main-btn:hover {
            background: #fff;
            color: #000;
        }

        /* 🔹 Контейнер */
        .container {
            width: 320px;
            text-align: center;
        }

        h1 {
            margin-bottom: 25px;
        }

        /* 🔹 Поля */
        input, select {
            width: 100%;
            padding: 8px 0;
            margin-bottom: 15px;
            border: none;
            border-bottom: 1px solid #fff;
            font-size: 16px;
            outline: none;
        }

        input:focus, select:focus {
            border-bottom: 1px solid #6c63ff;
        }

        /* 🔹 Кнопка */
        button {
            width: 100%;
            padding: 10px;
            border: 1px solid #fff;
            background: transparent;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #fff;
            color: #000;
        }

        /* 🔹 Результат */
        .result {
            margin-top: 25px;
            font-size: 14px;
            opacity: 0.8;
        }

        .result span {
            font-weight: bold;
        }
    </style>
</head>

<body>

<a href="/" class="main-btn">Main</a>

<div class="container">
    <h1>Калькулятор</h1>

    <form method="post">
        {% csrf_token %}

        <input type="text" name="num1" placeholder="Первое число" required>
        <input type="text" name="num2" placeholder="Второе число" required>

        <select name="operation">
            <option value="add">Сложение (+)</option>
            <option value="sub">Вычитание (-)</option>
            <option value="multi">Умножение (*)</option>
            <option value="div">Деление (/)</option>
        </select>

        <button type="submit">Посчитать</button>
    </form>

    {% if res is not None %}
    <div class="result">
        <div>Результат: {{ res }}</div>
        <div>
            <span>{{ num1 }}</span> и <span>{{ num2 }}</span>
        </div>
    </div>
    {% endif %}
</div>

</body>
</html>
