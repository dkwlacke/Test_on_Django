<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Главная</title>

        <style>
        @import url('https://fonts.googleapis.com/css2?family=Ubuntu+Mono&display=swap');

        * {
            font-family: "Ubuntu Mono", monospace;
            background-color: #000;
            color: #fff;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 🔹 Верхняя панель */
        .top-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .top-btn {
            padding: 8px 14px;
            border: 1px solid #fff;
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }

        .top-btn:hover {
            background: #fff;
            color: #000;
        }

        /* 🔹 Основной блок */
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
        }

        h2 {
            font-size: 16px;
            margin-bottom: 20px;
            opacity: 0.7;
        }

        /* 🔹 Ссылки */
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .links a {
            padding: 10px;
            border: 1px solid #fff;
            text-decoration: none;
            font-size: 16px;
            transition: 0.2s;
        }

        .links a:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>

<body>


<div class="top-bar">
    {% if request.user.is_authenticated %}
        <span class="top-btn">{{ request.user }}</span>
        <a href="logout" class="top-btn">Log out</a>
    {% else %}
        <a href="login" class="top-btn">Log in</a>
        <a href="register" class="top-btn">Register</a>
    {% endif %}
</div>

<div class="container">
    <h1>My test project on Django</h1>

    <div class="links">
        <a href="calc">Калькулятор</a>
        <a href="get_db">Список из БД</a>
        <a href="find">Поиск</a>
    </div>
</div>

</body>
</html>
